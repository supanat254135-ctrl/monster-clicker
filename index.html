<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS เหมือนเดิมทุกอย่างครับ */
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #020617; font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; user-select: none; width: 100vw; height: 100vh; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .start-btn { background: #fbbf24; color: #000; border: none; padding: 18px 45px; font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #b45309; transition: 0.1s; }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45309; }
        .header { background: #0f172a; padding: 10px 15px; border-bottom: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .money { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }
        .boss-area { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .boss-icon { font-size: 6rem; filter: drop-shadow(0 0 15px #f43f5e); transition: transform 0.05s; }
        .hp-box { width: 85%; height: 14px; background: #300; border: 1px solid #fff; border-radius: 50px; overflow: hidden; margin-top: 10px; }
        .hp-bar { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }
        .upgrade-container { height: 60vh; background: #0f172a; border-top: 2px solid #334155; display: flex; flex-direction: column; }
        .tab-menu { display: flex; background: #1e293b; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.9rem; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #0f172a; font-weight: bold; }
        .upgrade-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 80px; }
        .upgrade-list.active { display: block; }
        .up-card { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .up-info b { color: #38bdf8; font-size: 1rem; display: block; }
        .up-info span { font-size: 0.8rem; color: #94a3b8; }
        .btn-up { background: #fbbf24; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 90px; }
        .btn-up:disabled { background: #444; color: #888; opacity: 0.5; }
        .dmg-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 100; text-shadow: 2px 2px 0 #000; opacity: 0; }
        @keyframes floatOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150%) scale(1.3); opacity: 0; } }
        .btn-danger { background: #ef4444; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#fbbf24;">MONSTER CLICKER</h1>
        <p style="color:#94a3b8;">Captain Edition v2.1</p>
        <button class="start-btn" onclick="startGame()">▶ โหลดเซฟและเริ่มเล่น</button>
    </div>

    <div class="header">
        <div>
            <div class="money">🪙 <span id="money">0</span></div>
            <div style="font-size:0.75rem; color:#94a3b8;">🌟 จุติ: <span id="r-pts">0</span> | บอส Lv. <span id="blv">1</span></div>
        </div>
        <div id="combo-text" style="color:#38bdf8; font-weight:bold;"></div>
    </div>

    <div class="boss-area" onmousedown="handleAction(event)" ontouchstart="handleAction(event)">
        <div id="boss" class="boss-icon">👹</div>
        <div class="hp-box"><div id="hp-bar" class="hp-bar"></div></div>
        <div id="hp-text" style="font-size:0.75rem; margin-top:5px; font-weight:bold;">HP: 100 / 100</div>
    </div>

    <div class="upgrade-container">
        <div class="tab-menu">
            <div class="tab active" onclick="switchTab(this, 'atk-tab')">⚔️ พลัง</div>
            <div class="tab" onclick="switchTab(this, 'gold-tab')">💰 เงิน</div>
            <div class="tab" onclick="switchTab(this, 'rb-tab')">🌀 จุติ</div>
            <div class="tab" onclick="switchTab(this, 'info-tab')">❓ ข้อมูล</div>
        </div>

        <div id="atk-tab" class="upgrade-list active">
            <div class="up-card"><div class="up-info"><b>คมดาบไม้</b><span>ดาเมจ +15</span></div><button class="btn-up" onclick="buy('atk', 15, 50)">💰 50</button></div>
            <div class="up-card"><div class="up-info"><b>นัยน์ตาปีศาจ</b><span>คริติคอล +5%</span></div><button class="btn-up" onclick="buy('crit', 5, 200)">💰 200</button></div>
            <div class="up-card"><div class="up-info"><b>ถุงมือเหล็ก</b><span>ดาเมจกด x2</span></div><button class="btn-up" onclick="buy('tap', 1, 1000)">💰 1,000</button></div>
        </div>

        <div id="gold-tab" class="upgrade-list">
            <div class="up-card"><div class="up-info"><b>กระเป๋าผ้า</b><span>เงิน x1.2</span></div><button class="btn-up" onclick="buy('gold', 0.2, 100)">💰 100</button></div>
        </div>

        <div id="rb-tab" class="upgrade-list">
            <div style="background: linear-gradient(45deg, #1e293b, #4c1d95); padding: 20px; border-radius: 15px; text-align: center;">
                <h2 style="margin:0; color:#fbbf24;">🌀 ระบบจุติ</h2>
                <div id="rb-status" style="margin:15px 0; font-weight:bold;">ต้องการเงิน: 100,000</div>
                <button id="rb-btn" class="btn-up" onclick="doRebirth()" style="width:100%; height:50px;">จุติใหม่!</button>
            </div>
        </div>

        <div id="info-tab" class="upgrade-list">
            <button class="btn-danger" onclick="resetSave()">🗑️ ล้างข้อมูลเริ่มใหม่</button>
        </div>
    </div>

<script>
    // --- ตัวแปรหลัก ---
    let g = { money: 0, atk: 10, crit: 0, goldMult: 1.0, jackpot: 0, tapMult: 1, rPoints: 0, bossLv: 1, maxHP: 100, currentHP: 100 };
    const SAVE_KEY = 'captain_monster_final_v2.1';

    // --- ระบบเสียง ---
    const hitSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3');
    hitSfx.volume = 0.2; bgm.volume = 0.1; bgm.loop = true;

    // --- ฟังก์ชันบันทึก/โหลด ---
    function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify(g));
    }

    function load() {
        const data = localStorage.getItem(SAVE_KEY);
        if (data) {
            g = JSON.parse(data);
            updateUI(); // อัปเดตตัวเลขบนหน้าจอทันทีหลังจากอ่านเซฟ
            return true;
        }
        return false;
    }

    // --- เริ่มต้นเกม ---
    window.onload = () => {
        load(); // โหลดข้อมูลทันทีที่เปิดหน้าเว็บ
    };

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        bgm.play().catch(()=>{});
        setInterval(save, 5000); // ออโต้เซฟทุก 5 วินาที
    }

    // --- ระบบการเล่น ---
    function attack(x, y) {
        hitSfx.currentTime = 0; hitSfx.play().catch(()=>{});
        let rPower = Math.pow(2, g.rPoints);
        let finalDmg = g.atk * rPower * g.tapMult;
        
        g.currentHP -= finalDmg;
        showDmg(x, y, Math.floor(finalDmg));

        if (g.currentHP <= 0) {
            g.money += (g.bossLv * 50 * g.goldMult * rPower);
            g.bossLv++; g.maxHP = g.bossLv * 150; g.currentHP = g.maxHP;
        }
        updateUI();
        save(); // เซฟทุกครั้งที่ตี
    }

    function buy(type, val, cost) {
        if (g.money >= cost) {
            g.money -= cost;
            if(type === 'atk') g.atk += val;
            if(type === 'gold') g.goldMult += val;
            updateUI();
            save();
        }
    }

    function doRebirth() {
        if (g.money >= 100000) {
            g.rPoints++; g.money = 0; g.bossLv = 1; g.maxHP = 100; g.currentHP = 100;
            updateUI(); save();
            alert("✨ จุติสำเร็จ!");
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(g.money).toLocaleString();
        document.getElementById('blv').innerText = g.bossLv;
        document.getElementById('r-pts').innerText = g.rPoints;
        document.getElementById('hp-bar').style.width = (g.currentHP / g.maxHP * 100) + "%";
        document.getElementById('hp-text').innerText = `HP: ${Math.floor(g.currentHP)} / ${g.maxHP}`;
        
        // เช็กปุ่มอัปเกรด
        document.querySelectorAll('.btn-up').forEach(btn => {
            let costText = btn.innerText.replace('💰 ', '').replace(/,/g, '');
            if (!isNaN(parseInt(costText))) {
                btn.disabled = (g.money < parseInt(costText));
            }
        });
    }

    function resetSave() {
        if(confirm("ล้างเซฟ?")) { localStorage.removeItem(SAVE_KEY); location.reload(); }
    }

    function handleAction(e) {
        let touches = e.changedTouches ? Array.from(e.changedTouches) : [e];
        touches.forEach(t => attack(t.clientX, t.clientY));
    }

    function showDmg(x, y, v) {
        let d = document.createElement('div');
        d.className = 'dmg-text'; d.innerText = v;
        d.style.left = x + 'px'; d.style.top = y + 'px';
        d.style.color = '#f43f5e';
        document.body.appendChild(d);
        d.style.animation = 'floatOut 0.4s ease-out forwards';
        setTimeout(() => d.remove(), 400);
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.upgrade-list').forEach(l => l.style.display = 'none');
        el.classList.add('active');
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
