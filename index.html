<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker: Captain Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a18;
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --accent: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); font-family: 'Kanit', sans-serif; color: #fff; 
            overflow: hidden; user-select: none; width: 100vw; height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #050a18 100%);
        }

        /* --- Right Top Ranking Button --- */
        #rank-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            width: 55px; height: 55px; border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #d97706);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; transition: 0.2s;
        }
        #rank-btn:active { transform: scale(0.9) rotate(5deg); }

        /* --- Professional Name Modal --- */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .setup-card {
            width: 85%; padding: 40px 20px; border-radius: 30px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; backdrop-filter: blur(20px);
        }
        .input-box {
            width: 100%; padding: 15px; margin: 25px 0; border-radius: 15px;
            border: 2px solid var(--primary); background: rgba(0,0,0,0.3);
            color: #fff; font-size: 1.2rem; text-align: center;
        }

        /* --- Leaderboard Slide Panel --- */
        #leaderboard {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: var(--bg); z-index: 1500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #leaderboard.open { right: 0; }
        .lb-header { padding: 25px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); }
        .lb-list { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- Main Game Layout --- */
        .stats-bar { padding: 25px 20px; }
        .money-display { font-size: 2.8rem; font-weight: 600; color: var(--accent); letter-spacing: -1px; }
        
        .boss-section { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #boss-target { font-size: 7rem; cursor: pointer; filter: drop-shadow(0 0 25px var(--danger)); transition: 0.05s; }
        
        .hp-box { width: 80%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 30px; overflow: hidden; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, var(--danger), #fb7185); width: 100%; transition: width 0.1s; }

        .shop-area { 
            height: 45vh; background: var(--glass); border-radius: 40px 40px 0 0; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
        }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: 600;
        }
        .tab-btn.active { background: var(--primary); color: #fff; }

        .item-row { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .buy-btn { 
            background: #fff; color: #000; border: none; padding: 10px 18px; 
            border-radius: 12px; font-weight: 700; font-size: 0.9rem;
        }
        .buy-btn:disabled { opacity: 0.3; }

        /* --- Rank Item Style --- */
        .rank-card {
            display: flex; align-items: center; padding: 15px; 
            background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 10px;
        }
        .rank-card.top3 { border-left: 4px solid var(--accent); background: rgba(245, 158, 11, 0.05); }
        .rank-card.is-me { border: 2px solid var(--primary); background: rgba(14, 165, 233, 0.1); }
        .rank-index { width: 40px; font-weight: bold; color: var(--primary); }
        .rank-info { flex: 1; }
        .rank-lv { font-weight: bold; color: var(--accent); }

        .dmg-popup {
            position: fixed; pointer-events: none; color: #fff; font-weight: 800;
            font-size: 2rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: floatUp 0.7s ease-out forwards; z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="setup-screen" style="display: none;">
        <div class="setup-card">
            <h1 style="margin:0; font-weight:600;">MONSTER <span style="color:var(--primary)">CLICKER</span></h1>
            <p style="color:#64748b">กรุณาตั้งชื่อของท่านเพื่อเข้าสู่สมรภูมิ</p>
            <input type="text" id="name-input" class="input-box" placeholder="ชื่อกัปตัน..." maxlength="12">
            <button class="tab-btn active" style="width:100%; padding:18px;" onclick="startGame()">ยืนยันและเริ่มเล่น</button>
        </div>
    </div>

    <div id="rank-btn" onclick="toggleLeaderboard(true)">
        <i class="fa-solid fa-trophy"></i>
    </div>

    <div id="leaderboard">
        <div class="lb-header">
            <i class="fa-solid fa-chevron-left" onclick="toggleLeaderboard(false)" style="font-size:1.5rem"></i>
            <h2 style="margin:0">อันดับโลก (1-99)</h2>
        </div>
        <div style="padding: 10px 25px; font-size: 0.8rem; color: #64748b;">*บอทจะอัปเกรดตัวเองแข่งกับคุณตลอดเวลา*</div>
        <div class="lb-list" id="lb-list">
            </div>
    </div>

    <div class="stats-bar">
        <div class="money-display">🪙 <span id="gold-txt">0</span></div>
        <div style="font-size:0.9rem; color:#64748b; margin-top:5px;">
            <i class="fa-solid fa-bolt" style="color:var(--primary)"></i> จุติ: <span id="rb-txt">0</span> | 
            <i class="fa-solid fa-skull" style="color:var(--danger)"></i> บอสเลเวล: <span id="lv-txt">1</span>
        </div>
    </div>

    <div class="boss-section">
        <div id="boss-target" onclick="clickBoss(event)">👹</div>
        <div class="hp-box"><div id="hp-bar"></div></div>
        <div style="margin-top:10px; font-weight:200; font-size:0.8rem; color:#94a3b8;">BOSS HP: <span id="hp-txt">100</span></div>
    </div>

    <div class="shop-area">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab(this, 'atk-pane')">⚔️ พลังโจมตี</button>
            <button class="tab-btn" onclick="switchTab(this, 'gold-pane')">💰 การเงิน</button>
            <button class="tab-btn" onclick="switchTab(this, 'rb-pane')">🌀 จุติ</button>
        </div>

        <div id="shop-content" style="height: 30vh; overflow-y: auto;">
            </div>
    </div>

<script>
    // --- Data & State ---
    let game = {
        gold: 0, atk: 10, rb: 0, lv: 1, 
        hp: 100, mhp: 100, name: "",
        start: Date.now(),
        items: {
            sword: { lv: 0, base: 50 },
            glove: { lv: 0, base: 500 },
            bag: { lv: 0, base: 100 }
        }
    };

    let bots = [];
    const botNames = ["InwZa007", "DarkShadow", "ZenoX", "Captain_Pro", "GG_Ez", "LuckyMan", "Viper", "DragonSlayer", "SoloLevel", "MightyKing"];

    // --- Core Functions ---
    window.onload = () => {
        const saved = localStorage.getItem("CaptainClicker_Ult");
        if(saved) {
            game = JSON.parse(saved);
            updateUI();
        } else {
            document.getElementById('setup-screen').style.display = 'flex';
        }
        initBots();
        renderShop('atk-pane');
    };

    function startGame() {
        const name = document.getElementById('name-input').value;
        if(name.length < 2) return alert("ชื่อสั้นไปครับกัปตัน");
        game.name = name;
        game.start = Date.now();
        document.getElementById('setup-screen').style.display = 'none';
        save();
        updateUI();
    }

    function initBots() {
        for(let i=0; i<98; i++) {
            bots.push({
                name: botNames[Math.floor(Math.random()*botNames.length)] + "_" + (i+1),
                baseLv: Math.floor(Math.random() * 15) + 1
            });
        }
    }

    function toggleLeaderboard(show) {
        if(show) {
            renderLeaderboard();
            document.getElementById('leaderboard').classList.add('open');
        } else {
            document.getElementById('leaderboard').classList.remove('open');
        }
    }

    function renderLeaderboard() {
        const list = document.getElementById('lb-list');
        list.innerHTML = "";
        
        // Calculate Bot Growth (บอทโหดขึ้นทุกๆ 10 นาทีที่เล่น)
        let timeBonus = Math.floor((Date.now() - game.start) / 600000); 
        let players = bots.map(b => ({ name: b.name, lv: b.baseLv + timeBonus, isMe: false }));
        players.push({ name: game.name, lv: game.lv, isMe: true });
        
        players.sort((a,b) => b.lv - a.lv);
        players.slice(0, 99).forEach((p, i) => {
            const card = document.createElement('div');
            card.className = `rank-card ${i<3?'top3':''} ${p.isMe?'is-me':''}`;
            card.innerHTML = `
                <div class="rank-index">${i+1}</div>
                <div class="rank-info">
                    <div style="font-weight:600">${p.name}</div>
                    <div style="font-size:0.7rem; color:#64748b">${p.isMe?'คุณอยู่ที่นี่':'คู่แข่ง'}</div>
                </div>
                <div class="rank-lv">Lv. ${p.lv}</div>
            `;
            list.appendChild(card);
        });
    }

    function clickBoss(e) {
        const damage = game.atk * Math.pow(2, game.rb);
        game.hp -= damage;
        
        // FX
        const boss = document.getElementById('boss-target');
        boss.style.transform = "scale(0.8) translateY(10px)";
        setTimeout(() => boss.style.transform = "scale(1)", 50);
        
        createPopup(e.clientX, e.clientY, damage);

        if(game.hp <= 0) {
            let reward = game.lv * 45 * Math.pow(2, game.rb) * (1 + game.items.bag.lv * 0.2);
            game.gold += reward;
            game.lv++;
            game.mhp = game.lv * 180;
            game.hp = game.mhp;
            boss.innerText = ['👹','👽','👾','🐲','💀','🤖','🎃'][game.lv % 7];
        }
        updateUI();
    }

    function createPopup(x, y, val) {
        const p = document.createElement('div');
        p.className = 'dmg-popup';
        p.innerText = Math.floor(val);
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
    }

    function switchTab(btn, pane) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderShop(pane);
    }

    function renderShop(pane) {
        const container = document.getElementById('shop-content');
        container.innerHTML = "";
        
        if(pane === 'atk-pane') {
            container.innerHTML += createShopItem("ดาบเหล็กกล้า", `โจมตี +15`, game.items.sword.base, () => upgrade('sword', 15));
            container.innerHTML += createShopItem("ถุงมือไฟฟ้า", `โจมตี +120`, game.items.glove.base, () => upgrade('glove', 120));
        } else if(pane === 'gold-pane') {
            container.innerHTML += createShopItem("ถุงเงินผู้กล้า", `เงินที่ได้ +20%`, game.items.bag.base, () => upgrade('bag', 0));
        } else {
            container.innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <h3>🌀 ระบบจุติใหม่</h3>
                    <p style="color:#64748b; font-size:0.9rem;">รีเซ็ตเงินและเลเวลเพื่อรับพลังโจมตี x2 ถาวร</p>
                    <button class="tab-btn active" style="width:100%" onclick="doRebirth()">จุติ (ใช้ 100,000 🪙)</button>
                </div>
            `;
        }
    }

    function createShopItem(name, desc, cost, action) {
        const canBuy = game.gold >= cost;
        return `
            <div class="item-row">
                <div>
                    <div style="font-weight:600">${name}</div>
                    <div style="font-size:0.75rem; color:var(--primary)">${desc}</div>
                </div>
                <button class="buy-btn" ${canBuy?'':'disabled'} onclick="buyWrapper(this, ${cost}, ${action})">
                    💰 ${cost.toLocaleString()}
                </button>
            </div>
        `;
    }

    function buyWrapper(btn, cost, action) {
        if(game.gold >= cost) {
            game.gold -= cost;
            action();
            updateUI();
            renderShop(document.querySelector('.tab-btn.active').getAttribute('onclick').split("'")[3]);
            save();
        }
    }

    function upgrade(item, val) {
        game.items[item].lv++;
        game.items[item].base = Math.floor(game.items[item].base * 1.6);
        if(item === 'sword' || item === 'glove') game.atk += val;
    }

    function doRebirth() {
        if(game.gold >= 100000) {
            game.rb++; game.gold = 0; game.lv = 1; game.atk = 10;
            game.hp = 100; game.mhp = 100;
            game.items = { sword:{lv:0, base:50}, glove:{lv:0, base:500}, bag:{lv:0, base:100} };
            updateUI();
            save();
            alert("คุณได้จุติใหม่ พลังโจมตีพื้นฐานถูกคูณด้วย " + Math.pow(2, game.rb));
        } else {
            alert("เงินไม่พอครับกัปตัน!");
        }
    }

    function updateUI() {
        document.getElementById('gold-txt').innerText = Math.floor(game.gold).toLocaleString();
        document.getElementById('lv-txt').innerText = game.lv;
        document.getElementById('rb-txt').innerText = game.rb;
        document.getElementById('hp-bar').style.width = (game.hp / game.mhp * 100) + "%";
        document.getElementById('hp-txt').innerText = Math.floor(game.hp).toLocaleString();
    }

    function save() {
        localStorage.setItem("CaptainClicker_Ult", JSON.stringify(game));
    }
</script>
</body>
</html>
