<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Save & Sound</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #020617; font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; user-select: none; width: 100vw; height: 100vh; }
        
        /* หน้าเริ่มเกม */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .start-btn {
            background: #38bdf8; color: white; border: none; padding: 20px 50px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.9); }

        /* UI เกม */
        .header { background: #0f172a; padding: 10px 15px; border-bottom: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; }
        .money { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }
        .boss-area { height: 28vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .boss-icon { font-size: 5.5rem; filter: drop-shadow(0 0 15px #f43f5e); transition: transform 0.05s; }
        .hp-box { width: 85%; height: 12px; background: #300; border: 1px solid #fff; border-radius: 50px; overflow: hidden; margin-top: 10px; }
        .hp-bar { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }
        .upgrade-container { height: 62vh; background: #0f172a; border-top: 2px solid #334155; display: flex; flex-direction: column; }
        .tab-menu { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.8rem; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #0f172a; font-weight: bold; }
        .upgrade-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 80px; }
        .upgrade-list.active { display: block; }
        .up-card { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .btn-up { background: #fbbf24; color: #000; border: none; padding: 8px; border-radius: 8px; font-weight: bold; min-width: 90px; }
        .btn-up:disabled { background: #444; color: #888; opacity: 0.5; }
        .dmg-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 100; text-shadow: 2px 2px 0 #000; animation: floatOut 0.4s ease-out forwards; }
        @keyframes floatOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150%) scale(1.3); opacity: 0; } }
    </style>
</head>
<body onmousedown="handleAction(event)" ontouchstart="handleAction(event)">

    <div id="start-screen">
        <h1 style="color:#38bdf8; margin-bottom:5px;">MONSTER CLICKER</h1>
        <p style="color:#94a3b8; margin-bottom:30px;">By Captain</p>
        <button class="start-btn" onclick="startGame()">▶ กดเพื่อเริ่มเล่น</button>
        <p style="font-size:0.7rem; color:#475569; margin-top:15px;">ระบบจะบันทึกเกมให้อัตโนมัติ</p>
    </div>

    <div class="header" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div><div class="money">🪙 <span id="money">0</span></div><div style="font-size:0.7rem; color:#94a3b8;">🌟 จุติ: <span id="r-pts">0</span> | Lv. <span id="blv">1</span></div></div>
        <button onclick="resetGame()" style="background:none; border:1px solid #444; color:#444; font-size:0.6rem; border-radius:5px;">ลบเซฟ</button>
    </div>

    <div class="boss-area">
        <div id="boss" class="boss-icon">👹</div>
        <div class="hp-box"><div id="hp-bar" class="hp-bar"></div></div>
        <div id="hp-text" style="font-size:0.7rem; margin-top:5px;"></div>
    </div>

    <div class="upgrade-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div class="tab-menu">
            <div class="tab active" onclick="switchTab(this, 'atk-tab')">⚔️ พลัง</div>
            <div class="tab" onclick="switchTab(this, 'gold-tab')">💰 เงิน</div>
            <div class="tab" onclick="switchTab(this, 'rb-tab')">🌀 จุติ</div>
        </div>
        <div id="atk-tab" class="upgrade-list active">
            <div class="up-card"><div><b>ดาบไม้</b><br><small>Atk +15</small></div><button class="btn-up" onclick="buy('atk', 15, 50)">💰 50</button></div>
            <div class="up-card"><div><b>ดาบเหล็ก</b><br><small>Atk +100</small></div><button class="btn-up" onclick="buy('atk', 100, 2000)">💰 2,000</button></div>
        </div>
        <div id="gold-tab" class="upgrade-list">
            <div class="up-card"><div><b>กระเป๋าผ้า</b><br><small>เงิน x1.2</small></div><button class="btn-up" onclick="buy('gold', 0.2, 100)">💰 100</button></div>
        </div>
        <div id="rb-tab" class="upgrade-list">
            <div style="text-align:center; padding:20px;">
                <p id="rb-status">ต้องการ 100,000</p>
                <button id="rb-btn" class="btn-up" onclick="doRebirth()" style="width:100%;">จุติ!</button>
            </div>
        </div>
    </div>

<script>
    // เสียงประกอบ
    const hitSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const buySfx = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
    const bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3'); // เสียงเพลินๆ
    bgm.loop = true; bgm.volume = 0.2;

    let money=0, atk=10, goldMult=1, rPoints=0, bossLv=1, maxHP=100, currentHP=100;

    // ระบบโหลดเกม
    function loadGame() {
        const saved = localStorage.getItem('captain_save');
        if (saved) {
            const data = JSON.parse(saved);
            money = data.money; atk = data.atk; goldMult = data.goldMult;
            rPoints = data.rPoints; bossLv = data.bossLv;
            maxHP = bossLv * 150; currentHP = maxHP;
        }
        updateUI();
    }

    // ระบบบันทึกเกม
    function saveGame() {
        const data = { money, atk, goldMult, rPoints, bossLv };
        localStorage.setItem('captain_save', JSON.stringify(data));
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        bgm.play();
        loadGame();
    }

    function handleAction(e){ 
        if(e.target.closest('.header')||e.target.closest('.upgrade-container')||document.getElementById('start-screen').style.display !== 'none') return;
        let t=e.changedTouches?Array.from(e.changedTouches):[e]; 
        t.forEach(i=>attack(i.clientX,i.clientY));
    }

    function attack(x,y){
        hitSfx.currentTime = 0; hitSfx.play();
        let p=Math.pow(2,rPoints), d=atk*p; currentHP-=d; showDmg(x,y,Math.floor(d));
        if(currentHP<=0){ 
            money+=bossLv*50*goldMult*p; bossLv++; maxHP=bossLv*150; currentHP=maxHP; 
            saveGame(); // บันทึกทุกครั้งที่ฆ่าบอสได้
        }
        updateUI();
    }

    function showDmg(x,y,v){
        let d=document.createElement('div'); d.className='dmg-text'; d.innerText=v; 
        d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),400);
    }

    function buy(t,v,c){ 
        if(money>=c){ 
            buySfx.play(); money-=c; 
            if(t==='atk')atk+=v; if(t==='gold')goldMult+=v; 
            updateUI(); saveGame(); 
        } 
    }

    function resetGame() { if(confirm("ต้องการลบเซฟเริ่มใหม่ใช่ไหม?")){ localStorage.removeItem('captain_save'); location.reload(); } }

    function switchTab(el,id){ 
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
        document.querySelectorAll('.upgrade-list').forEach(l=>l.style.display='none'); 
        el.classList.add('active'); document.getElementById(id).style.display='block'; 
    }

    function updateUI(){
        document.getElementById('money').innerText=Math.floor(money).toLocaleString();
        document.getElementById('blv').innerText=bossLv; document.getElementById('r-pts').innerText=rPoints;
        document.getElementById('hp-bar').style.width=(currentHP/maxHP*100)+"%";
        document.getElementById('hp-text').innerText=`HP: ${Math.floor(currentHP)} / ${maxHP}`;
    }
</script>
</body>
</html>
