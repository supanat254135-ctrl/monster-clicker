<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Edition v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- Style เดิมของกัปตัน --- */
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #020617; font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; user-select: none; width: 100vw; height: 100vh; }

        /* --- หน้าจอตั้งชื่อใหม่ (Premium) --- */
        #start-screen { position: fixed; inset: 0; background: #020617; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .name-card { background: #0f172a; padding: 40px; border-radius: 30px; border: 2px solid #38bdf8; width: 85%; max-width: 400px; }
        .name-input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #334155; background: #1e293b; color: #fff; font-size: 1.2rem; text-align: center; margin: 20px 0; }
        .start-btn { background: #fbbf24; color: #000; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 0 #b45309; }

        /* --- ปุ่มที่เพิ่มมาใหม่ (มุมบน) --- */
        .top-left-btns { position: fixed; top: 15px; left: 15px; z-index: 2000; display: flex; gap: 10px; }
        .top-right-btns { position: fixed; top: 15px; right: 15px; z-index: 2000; }
        .circle-btn { width: 50px; height: 50px; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-blue { background: #38bdf8; color: #fff; }
        .btn-gold { background: #fbbf24; color: #000; }

        /* --- UI เดิม --- */
        .header { background: #0f172a; padding: 15px; border-bottom: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; padding-top: 75px; }
        .money { font-size: 2rem; color: #fbbf24; font-weight: bold; }
        .boss-area { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .boss-icon { font-size: 6.5rem; filter: drop-shadow(0 0 15px #f43f5e); transition: transform 0.05s; }
        .hp-box { width: 85%; height: 16px; background: #300; border: 1px solid #fff; border-radius: 50px; overflow: hidden; margin-top: 15px; }
        .hp-bar { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }

        .upgrade-container { height: 55vh; background: #0f172a; border-top: 2px solid #334155; display: flex; flex-direction: column; }
        .tab-menu { display: flex; background: #1e293b; overflow-x: auto; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #94a3b8; white-space: nowrap; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #0f172a; font-weight: bold; }

        .upgrade-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 80px; }
        .upgrade-list.active { display: block; }
        .up-card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .btn-up { background: #fbbf24; color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; min-width: 90px; }
        .btn-up:disabled { background: #444; color: #888; opacity: 0.5; }

        /* Ranking Panel */
        #rank-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #0f172a; z-index: 2500; border-radius: 30px 30px 0 0; border-top: 5px solid #fbbf24; transition: 0.4s; padding: 20px; overflow-y: auto; }
        #rank-panel.active { bottom: 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; background: #1e293b; margin-bottom: 8px; border-radius: 10px; }
        .rank-item.me { border: 2px solid #38bdf8; background: #172554; }

        /* Floating Damage */
        .dmg-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 100; text-shadow: 2px 2px 0 #000; animation: floatOut 0.4s ease-out forwards; color: #fff; font-size: 1.5rem; }
        @keyframes floatOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(1.3); opacity: 0; } }
    </style>
</head>
<body onmousedown="handleAction(event)" ontouchstart="handleAction(event)">

    <div id="start-screen">
        <div class="name-card">
            <h1 style="color:#fbbf24; margin:0;">MONSTER CLICKER</h1>
            <p style="color:#94a3b8;">ยินดีต้อนรับกัปตัน!</p>
            <input type="text" id="p-name-input" class="name-input" placeholder="ใส่ชื่อเท่ๆ ของคุณ..." maxlength="12">
            <button class="start-btn" onclick="confirmName()">เริ่มเล่นเกม</button>
        </div>
    </div>

    <div class="top-left-btns">
        <div class="circle-btn btn-blue" onclick="alert('วิธีเล่น: จิ้มบอสเพื่อหาเงิน อัปเกรดอาวุธ และจุติเพื่อพลัง x2!')"><i class="fa-solid fa-book"></i></div>
        <div class="circle-btn btn-blue" onclick="alert('ติดต่อกัปตัน: FB: Supanat Ctrl / Discord: Captain_Elite')"><i class="fa-solid fa-envelope"></i></div>
    </div>

    <div class="top-right-btns">
        <div class="circle-btn btn-gold" onclick="toggleRank(true)"><i class="fa-solid fa-trophy"></i></div>
    </div>

    <div class="header">
        <div>
            <div class="money">🪙 <span id="money">0</span></div>
            <div style="font-size:0.75rem; color:#94a3b8;">🌟 จุติ: <span id="r-pts">0</span> | บอส Lv. <span id="blv">1</span></div>
        </div>
        <div id="combo-text" style="color:#38bdf8; font-weight:bold;"></div>
    </div>

    <div class="boss-area">
        <div id="boss" class="boss-icon">👹</div>
        <div class="hp-box"><div id="hp-bar" class="hp-bar"></div></div>
        <div id="hp-text" style="font-size:0.75rem; margin-top:5px;">HP: 100 / 100</div>
    </div>

    <div class="upgrade-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div class="tab-menu">
            <div class="tab active" onclick="switchTab(this, 'atk-tab')">⚔️ พลัง</div>
            <div class="tab" onclick="switchTab(this, 'gold-tab')">💰 เงิน</div>
            <div class="tab" onclick="switchTab(this, 'rb-tab')">🌀 จุติ</div>
        </div>

        <div id="atk-tab" class="upgrade-list active">
            <div class="up-card"><div><b>ดาบไม้</b><br><small>ดาเมจ +15</small></div><button class="btn-up" onclick="buy('atk', 15, 50)">💰 50</button></div>
            <div class="up-card"><div><b>นัยน์ตาปีศาจ</b><br><small>คริ +5%</small></div><button class="btn-up" onclick="buy('crit', 5, 200)">💰 200</button></div>
        </div>

        <div id="gold-tab" class="upgrade-list">
            <div class="up-card"><div><b>กระเป๋าผ้า</b><br><small>เงิน x1.2</small></div><button class="btn-up" onclick="buy('gold', 0.2, 100)">💰 100</button></div>
        </div>

        <div id="rb-tab" class="upgrade-list">
            <div style="background:#1e293b; padding:20px; border-radius:15px; text-align:center;">
                <h2>🌀 ระบบจุติ</h2>
                <p id="rb-status">ต้องการเงิน: 100,000</p>
                <button id="rb-btn" class="btn-up" onclick="doRebirth()" style="width:100%">จุติใหม่ (พลัง x2)</button>
            </div>
        </div>
    </div>

    <div id="rank-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>🏆 อันดับโลก Top 99</h2>
            <button onclick="toggleRank(false)" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="leaderboard-list"></div>
    </div>

<script>
    const SAVE_KEY = "MonsterClicker_Captain_Data";
    let money = 0, atk = 10, crit = 0, goldMult = 1.0, rPoints = 0, bossLv = 1;
    let maxHP = 100, currentHP = 100, combo = 0, comboTimer, playerName = "";
    let rivals = [];

    // --- ฟังก์ชันใหม่: จัดการอันดับและชื่อ ---
    function confirmName() {
        const input = document.getElementById('p-name-input').value;
        if(input.length < 2) return alert("ชื่อสั้นไปกัปตัน!");
        playerName = input;
        document.getElementById('start-screen').style.display = 'none';
        initRivals();
        saveGame();
    }

    function initRivals() {
        rivals = [];
        for(let i=1; i<=98; i++) {
            rivals.push({ name: "Player_"+i, lv: (100-i) * 500 + Math.floor(Math.random()*1000) });
        }
        setInterval(() => { // บอทเก่งขึ้นทุก 1 นาที
            rivals.forEach(r => r.lv += Math.floor(Math.random()*5));
            renderRank();
        }, 60000);
    }

    function toggleRank(show) {
        if(show) renderRank();
        document.getElementById('rank-panel').classList.toggle('active', show);
    }

    function renderRank() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = "";
        let all = [...rivals, { name: playerName, lv: bossLv, me: true }];
        all.sort((a,b) => b.lv - a.lv);
        all.slice(0, 99).forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `rank-item ${p.me ? 'me' : ''}`;
            div.innerHTML = `<span>#${i+1} ${p.name}</span> <span>Lv. ${p.lv.toLocaleString()}</span>`;
            list.appendChild(div);
        });
    }

    // --- ระบบเดิมของกัปตัน (ห้ามหาย!) ---
    window.onload = () => {
        const saved = localStorage.getItem(SAVE_KEY);
        if(saved) {
            const d = JSON.parse(saved);
            money = d.money; atk = d.atk; crit = d.crit; goldMult = d.goldMult;
            rPoints = d.rPoints; bossLv = d.bossLv; playerName = d.playerName;
            maxHP = bossLv * 150; currentHP = maxHP;
            document.getElementById('start-screen').style.display = 'none';
            initRivals();
            updateUI();
        }
    };

    function handleAction(e) {
        if (e.target.closest('.header') || e.target.closest('.upgrade-container') || e.target.closest('.top-left-btns') || e.target.closest('.top-right-btns') || document.getElementById('start-screen').style.display !== 'none') return;
        attack(e.clientX || (e.touches ? e.touches[0].clientX : 0), e.clientY || (e.touches ? e.touches[0].clientY : 0));
    }

    function attack(x, y) {
        combo++;
        clearTimeout(comboTimer);
        comboTimer = setTimeout(() => { combo = 0; updateUI(); }, 1000);

        let dmg = atk * Math.pow(2, rPoints) * (1 + combo * 0.01);
        if(Math.random()*100 < crit) { dmg *= 2; showDmg(x, y, "CRIT! " + Math.floor(dmg)); }
        else { showDmg(x, y, Math.floor(dmg)); }
        
        currentHP -= dmg;
        if(currentHP <= 0) {
            money += bossLv * 50 * goldMult * Math.pow(2, rPoints);
            bossLv++; maxHP = bossLv * 150; currentHP = maxHP;
            saveGame();
        }
        const b = document.getElementById('boss');
        b.style.transform = "scale(0.8)";
        setTimeout(() => b.style.transform = "scale(1)", 50);
        updateUI();
    }

    function showDmg(x, y, val) {
        const d = document.createElement('div');
        d.className = 'dmg-text'; d.innerText = val;
        d.style.left = x + 'px'; d.style.top = y + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 400);
    }

    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.upgrade-list').forEach(l => l.style.display = 'none');
        el.classList.add('active');
        document.getElementById(id).style.display = 'block';
    }

    function buy(type, val, cost) {
        if(money >= cost) {
            money -= cost;
            if(type === 'atk') atk += val;
            if(type === 'crit') crit += val;
            if(type === 'gold') goldMult += val;
            updateUI(); saveGame();
        }
    }

    function doRebirth() {
        if(money >= 100000) {
            rPoints++; money = 0; bossLv = 1; atk = 10;
            maxHP = 100; currentHP = maxHP;
            updateUI(); saveGame();
            alert("จุติแล้ว!");
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money).toLocaleString();
        document.getElementById('blv').innerText = bossLv;
        document.getElementById('r-pts').innerText = rPoints;
        document.getElementById('hp-bar').style.width = (currentHP/maxHP*100) + "%";
        document.getElementById('hp-text').innerText = `HP: ${Math.floor(currentHP).toLocaleString()} / ${maxHP.toLocaleString()}`;
        document.getElementById('combo-text').innerText = combo > 0 ? "COMBO x" + combo : "";
        document.getElementById('rb-btn').disabled = money < 100000;
    }

    function saveGame() {
        const data = { money, atk, crit, goldMult, rPoints, bossLv, playerName };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    }
</script>
</body>
</html>
