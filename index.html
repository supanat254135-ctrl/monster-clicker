<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Sound</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #020617; font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; user-select: none; width: 100vw; height: 100vh; }
        .header { background: #0f172a; padding: 10px 15px; border-bottom: 2px solid #38bdf8; display: flex; justify-content: space-between; align-items: center; z-index: 50; position: relative; }
        .money { font-size: 1.8rem; color: #fbbf24; font-weight: bold; }
        .boss-area { height: 28vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .boss-icon { font-size: 5.5rem; filter: drop-shadow(0 0 15px #f43f5e); transition: transform 0.05s; cursor: pointer; }
        .hp-box { width: 85%; height: 12px; background: #300; border: 1px solid #fff; border-radius: 50px; overflow: hidden; margin-top: 10px; }
        .hp-bar { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }
        .upgrade-container { height: 62vh; background: #0f172a; border-top: 2px solid #334155; display: flex; flex-direction: column; }
        .tab-menu { display: flex; background: #1e293b; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.8rem; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #0f172a; font-weight: bold; }
        .upgrade-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; padding-bottom: 100px; }
        .upgrade-list.active { display: block; }
        .up-card { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .up-info b { color: #38bdf8; font-size: 0.9rem; display: block; }
        .up-info span { font-size: 0.7rem; color: #94a3b8; }
        .btn-up { background: #fbbf24; color: #000; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; min-width: 90px; font-size: 0.8rem; }
        .btn-up:disabled { background: #444; color: #888; opacity: 0.5; }
        .dmg-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 100; text-shadow: 2px 2px 0 #000; animation: floatOut 0.4s ease-out forwards; }
        @keyframes floatOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150%) scale(1.3); opacity: 0; } }
        .sound-btn { background: #334155; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body onmousedown="handleAction(event)" ontouchstart="handleAction(event)">
    
    <div style="position: absolute; bottom: 85px; right: 15px; z-index: 100;">
        <button id="mute-btn" class="sound-btn" onclick="toggleMute()">🔊 เปิดเสียง</button>
    </div>

    <div class="header" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div><div class="money">🪙 <span id="money">0</span></div><div style="font-size:0.7rem; color:#94a3b8;">🌟 จุติ: <span id="r-pts">0</span> | Lv. <span id="blv">1</span></div></div>
        <div id="combo-text" style="color:#38bdf8; font-weight:bold;"></div>
    </div>

    <div class="boss-area">
        <div id="boss" class="boss-icon">👹</div>
        <div class="hp-box"><div id="hp-bar" class="hp-bar"></div></div>
        <div id="hp-text" style="font-size:0.7rem; margin-top:5px;"></div>
    </div>

    <div class="upgrade-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div class="tab-menu">
            <div class="tab active" onclick="switchTab(this, 'atk-tab')">⚔️ พลัง</div>
            <div class="tab" onclick="switchTab(this, 'gold-tab')">💰 เงิน</div>
            <div class="tab" onclick="switchTab(this, 'rb-tab')">🌀 จุติ</div>
            <div class="tab" onclick="switchTab(this, 'info-tab')">❓ ข้อมูล</div>
        </div>

        <div id="atk-tab" class="upgrade-list active">
            <div class="up-card"><div class="up-info"><b>ดาบไม้</b><span>Atk +15</span></div><button class="btn-up" onclick="buy('atk', 15, 50)">💰 50</button></div>
            <div class="up-card"><div class="up-info"><b>ถุงมือเหล็ก</b><span>Tap x2</span></div><button class="btn-up" onclick="buy('tap', 1, 500)">💰 500</button></div>
            <div class="up-card"><div class="up-info"><b>ดาบเหล็ก</b><span>Atk +100</span></div><button class="btn-up" onclick="buy('atk', 100, 2000)">💰 2,000</button></div>
        </div>

        <div id="gold-tab" class="upgrade-list">
            <div class="up-card"><div class="up-info"><b>กระเป๋าผ้า</b><span>เงิน x1.2</span></div><button class="btn-up" onclick="buy('gold', 0.2, 100)">💰 100</button></div>
            <div class="up-card"><div class="up-info"><b>เหรียญโชคดี</b><span>สุ่ม x5</span></div><button class="btn-up" onclick="buy('jack', 5, 800)">💰 800</button></div>
        </div>

        <div id="rb-tab" class="upgrade-list">
            <div style="text-align:center; padding:20px; background:#1e293b; border-radius:15px; border:2px solid #38bdf8;">
                <h3>🌀 จุติใหม่</h3><p id="rb-status">ต้องการ: 100,000</p>
                <button id="rb-btn" class="btn-up" onclick="doRebirth()" style="width:100%; height:45px;">จุติ!</button>
            </div>
        </div>

        <div id="info-tab" class="upgrade-list">
             <div style="background:#1e293b; padding:15px; border-radius:12px;">
                <p>ผู้พัฒนา: <b>Captain</b></p>
                <p style="font-size:0.8rem; color:#94a3b8;">เกมนี้รองรับเสียงประกอบแล้ว!</p>
            </div>
        </div>
    </div>

<script>
    // ตั้งค่าเสียง
    const hitSound = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const buySound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
    const bgm = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    bgm.loop = true;
    bgm.volume = 0.3;

    let isMuted = true;
    let money=0, atk=10, crit=0, goldMult=1, jackpot=0, tapMult=1, rPoints=0, bossLv=1, maxHP=100, currentHP=100, combo=0, comboT;

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        if (isMuted) {
            bgm.pause();
            btn.innerText = "🔇 ปิดเสียงอยู่";
            btn.style.background = "#444";
        } else {
            bgm.play().catch(e => console.log("ต้องกดที่จอก่อนถึงจะเล่นเสียงได้"));
            btn.innerText = "🔊 เปิดเสียงแล้ว";
            btn.style.background = "#38bdf8";
        }
    }

    function playSfx(sound) {
        if (!isMuted) {
            sound.currentTime = 0;
            sound.play();
        }
    }

    function handleAction(e){ 
        if(e.target.closest('.header')||e.target.closest('.upgrade-container')||e.target.id==='mute-btn') return; 
        let t=e.changedTouches?Array.from(e.changedTouches):[e]; 
        t.forEach(i=>attack(i.clientX,i.clientY)); 
    }

    function attack(x,y){
        playSfx(hitSound);
        combo++; clearTimeout(comboT); comboT=setTimeout(()=>{combo=0;updateUI();},1000);
        let p=Math.pow(2,rPoints), d=atk*p*(1+combo*0.01)*tapMult, c=Math.random()*100<crit; 
        if(c)d*=2; currentHP-=d; showDmg(x,y,Math.floor(d),c);
        
        const bIcon = document.getElementById('boss');
        bIcon.style.transform = 'scale(0.8)';
        setTimeout(() => bIcon.style.transform = 'scale(1)', 50);

        if(currentHP<=0){ 
            let r=bossLv*50*goldMult*p; 
            if(Math.random()*100<jackpot)r*=5; 
            money+=r; bossLv++; maxHP=bossLv*150; currentHP=maxHP; 
            document.getElementById('boss').innerText=['👹','👾','👽','🐲','🤖','💀'][bossLv%6]; 
        } 
        updateUI();
    }

    function showDmg(x,y,v,c){ 
        let d=document.createElement('div'); d.className='dmg-text'; 
        d.innerText=c?"💥 "+v:v; d.style.color=c?"#fbbf24":"#f43f5e"; 
        d.style.left=x+'px'; d.style.top=y+'px'; 
        document.body.appendChild(d); setTimeout(()=>d.remove(),400); 
    }

    function switchTab(el,id){ 
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
        document.querySelectorAll('.upgrade-list').forEach(l=>l.style.display='none'); 
        el.classList.add('active'); document.getElementById(id).style.display='block'; 
    }

    function buy(t,v,c){ 
        if(money>=c){ 
            playSfx(buySound);
            money-=c; 
            if(t==='atk')atk+=v; 
            if(t==='crit')crit+=v; 
            if(t==='tap')tapMult+=v; 
            if(t==='gold')goldMult+=v; 
            if(t==='jack')jackpot+=v; 
            updateUI(); 
        }
    }

    function doRebirth(){ 
        if(money>=100000){ 
            playSfx(buySound);
            rPoints++; money=0; atk=10; crit=0; goldMult=1; jackpot=0; tapMult=1; bossLv=1; maxHP=100; currentHP=maxHP; 
            updateUI(); 
            alert("จุติสำเร็จ! พลัง x"+Math.pow(2,rPoints)); 
        }
    }

    function updateUI(){
        document.getElementById('money').innerText=Math.floor(money).toLocaleString();
        document.getElementById('blv').innerText=bossLv; document.getElementById('r-pts').innerText=rPoints;
        document.getElementById('hp-bar').style.width=(currentHP/maxHP*100)+"%";
        document.getElementById('hp-text').innerText=`HP: ${Math.floor(currentHP)} / ${maxHP}`;
        document.getElementById('combo-text').innerText=combo > 1 ? `X${combo}` : "";
        
        let rbB=document.getElementById('rb-btn'), rbS=document.getElementById('rb-status');
        if(money>=100000){ rbB.disabled=false; rbB.style.background="#fbbf24"; rbS.innerText="พร้อมจุติแล้ว!"; rbS.style.color="#4ade80"; }
        else { rbB.disabled=true; rbB.style.background="#444"; rbS.innerText="ขาดอีก: "+(100000-Math.floor(money)).toLocaleString(); rbS.style.color="#fb7185"; }
        
        document.querySelectorAll('.btn-up').forEach(b=>{ 
            if(b.id!=='rb-btn'){ 
                let c=parseInt(b.innerText.replace(/[^\d]/g,'')); 
                b.disabled=money<c; 
            }
        });
    }
    updateUI();
</script>
</body>
</html>
