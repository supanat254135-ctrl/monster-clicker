<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0b1120; font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
        .money { color: #fbbf24; font-size: 2rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .boss-area { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .boss-icon { font-size: 6rem; filter: drop-shadow(0 0 20px #f43f5e); }
        .hp-box { width: 85%; height: 14px; background: #300; border-radius: 50px; margin-top: 15px; position: relative; overflow: hidden; border: 1px solid #444; }
        .hp-bar { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }
        .menu-container { height: 50vh; background: #0f172a; border-top: 2px solid #1e293b; }
        .tabs { display: flex; background: #1e293b; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #94a3b8; cursor: pointer; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #0f172a; }
        .list { padding: 15px; overflow-y: auto; height: 100%; display: none; }
        .list.active { display: block; }
        .card { background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-gold { background: #fbbf24; color: #000; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; min-width: 80px; }
        .btn-long { background: #fbbf24; color: #000; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 20px; }
        .dmg { position: absolute; font-weight: bold; color: #fff; animation: out 0.5s forwards; pointer-events: none; }
        @keyframes out { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body onclick="hit(event)">
    <div class="header">
        <div class="money">🪙 <span id="m">0</span></div>
        <div style="font-size:0.8rem;color:#94a3b8">🌟 จุติ: <span id="rp">0</span> | Lv.<span id="lv">1</span></div>
    </div>
    <div class="boss-area">
        <div class="boss-icon">👹</div>
        <div class="hp-box"><div id="hpb" class="hp-bar"></div></div>
        <div id="hpt" style="font-size:0.7rem;margin-top:5px">HP: 100/100</div>
    </div>
    <div class="menu-container" onclick="event.stopPropagation()">
        <div class="tabs">
            <div class="tab active" onclick="tab(this,'atk')">⚔️ พลัง</div>
            <div class="tab" onclick="tab(this,'gold')">💰 เงิน</div>
            <div class="tab" onclick="tab(this,'rb')">🌀 จุติ</div>
        </div>
        <div id="atk" class="list active">
            <div class="card"><div><b>ดาบไม้</b><br><small>Atk +15</small></div><button class="btn-gold" onclick="buy('a',15,50)">50</button></div>
            <div class="card"><div><b>ดาบเหล็ก</b><br><small>Atk +100</small></div><button class="btn-gold" onclick="buy('a',100,2000)">2,000</button></div>
        </div>
        <div id="gold" class="list">
            <div class="card"><div><b>กระเป๋าผ้า</b><br><small>เงิน x1.2</small></div><button class="btn-gold" onclick="buy('g',0.2,100)">100</button></div>
        </div>
        <div id="rb" class="list" style="text-align:center">
            <h3>🌀 จุติใหม่</h3>
            <button class="btn-long" id="rbb" onclick="rebirth()">จุติ!</button>
        </div>
    </div>
<script>
    let m=0, atk=10, g=1, rp=0, lv=1, hp=100, mhp=100;
    const save=()=>localStorage.setItem('cap_v', JSON.stringify({m,atk,g,rp,lv}));
    function hit(e){
        let d=atk*Math.pow(2,rp); hp-=d;
        let p=document.createElement('div'); p.className='dmg'; p.innerText=d; p.style.left=e.clientX+'px'; p.style.top=e.clientY+'px'; document.body.appendChild(p); setTimeout(()=>p.remove(),500);
        if(hp<=0){ m+=(lv*50)*g*Math.pow(2,rp); lv++; mhp=lv*150; hp=mhp; save(); }
        up();
    }
    function buy(t,v,c){ if(m>=c){ m-=c; if(t==='a')atk+=v; else g+=v; save(); up(); } }
    function rebirth(){ if(m>=100000){ rp++; m=0; atk=10; g=1; lv=1; hp=100; mhp=100; save(); up(); } }
    function tab(el,id){
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.list').forEach(l=>l.classList.remove('active'));
        el.classList.add('active'); document.getElementById(id).classList.add('active');
    }
    function up(){
        document.getElementById('m').innerText=Math.floor(m).toLocaleString();
        document.getElementById('rp').innerText=rp; document.getElementById('lv').innerText=lv;
        document.getElementById('hpb').style.width=(hp/mhp*100)+'%';
        document.getElementById('hpt').innerText=`HP: ${Math.floor(hp)} / ${mhp}`;
        document.getElementById('rbb').disabled = m < 100000;
    }
    const s=localStorage.getItem('cap_v'); if(s){ const d=JSON.parse(s); m=d.m; atk=d.atk; g=d.g; rp=d.rp; lv=d.lv; mhp=lv*150; hp=mhp; }
    up();
</script>
</body>
</html>
