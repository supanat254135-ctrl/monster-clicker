<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Elite Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --bg: #020617;
            --card: #0f172a;
            --danger: #f43f5e;
            --success: #22c55e;
        }

        * { touch-action: manipulation; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); font-family: 'Kanit', sans-serif; color: #fff; 
            overflow: hidden; user-select: none;
        }

        /* --- หน้าจอตั้งชื่อ (สวยกว่าเดิม) --- */
        #start-screen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b, #020617);
            z-index: 3000; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .name-card {
            background: var(--card); width: 100%; max-width: 350px; padding: 40px 25px;
            border-radius: 30px; border: 2px solid var(--primary); text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .name-card h1 { margin: 0 0 10px; color: var(--primary); font-size: 1.8rem; }
        .name-input {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #334155;
            background: #1e293b; color: #fff; font-size: 1.2rem; text-align: center; margin: 25px 0;
        }
        .start-btn {
            background: var(--accent); color: #000; border: none; width: 100%;
            padding: 15px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        /* --- ปุ่มจัดลำดับขวาบน --- */
        #rank-trigger {
            position: fixed; top: 15px; right: 15px; z-index: 2000;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000; width: 50px; height: 50px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- ตารางจัดลำดับ (Slide Up) --- */
        #rank-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: var(--card); z-index: 2500; border-top: 4px solid var(--accent);
            border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0.33, 1, 0.68, 1);
            padding: 20px; display: flex; flex-direction: column;
        }
        #rank-panel.active { bottom: 0; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #rank-list { flex: 1; overflow-y: auto; padding-bottom: 50px; }
        
        /* รายชื่อในตาราง */
        .rank-item {
            display: flex; align-items: center; padding: 15px; background: #1e293b;
            border-radius: 15px; margin-bottom: 8px; border: 1px solid transparent;
        }
        .rank-item.me { border: 2px solid var(--primary); background: #172554; }
        .rank-item span:nth-child(1) { width: 40px; font-weight: bold; color: var(--accent); }
        .rank-item span:nth-child(2) { flex: 1; }
        .rank-item span:nth-child(3) { color: var(--primary); font-weight: bold; }

        /* --- ส่วนแสดงผลหลัก --- */
        .header { padding: 20px; }
        .gold-display { font-size: 2.5rem; color: var(--accent); font-weight: bold; }
        
        .boss-area { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .boss-icon { font-size: 7rem; transition: transform 0.05s; filter: drop-shadow(0 0 20px var(--danger)); }
        .hp-box { width: 80%; height: 12px; background: #1e293b; border-radius: 50px; margin-top: 25px; overflow: hidden; border: 1px solid #334155; }
        .hp-fill { height: 100%; background: var(--danger); width: 100%; transition: width 0.1s; }

        .tabs { display: flex; background: #1e293b; margin: 10px; border-radius: 15px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; color: #94a3b8; border-radius: 10px; border: none; background: none; }
        .tab-btn.active { background: var(--card); color: var(--primary); font-weight: bold; }

        .content-area { height: 40vh; overflow-y: auto; padding: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b; }
        .buy-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; }
        .buy-btn:disabled { opacity: 0.3; }

        /* เอฟเฟกต์ตัวเลขลอย */
        .dmg-text { position: absolute; pointer-events: none; color: #fff; font-weight: 900; font-size: 1.8rem; animation: floatUp 0.6s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body onclick="attack(event)">

    <div id="start-screen">
        <div class="name-card">
            <h1>MONSTER CLICKER</h1>
            <p style="color: #64748b;">ยินดีต้อนรับกัปตันคนใหม่!</p>
            <input type="text" id="player-name-input" class="name-input" placeholder="ใส่ชื่อเท่ๆ ของคุณ..." maxlength="10">
            <button class="start-btn" onclick="confirmName()">เข้าสู่เกม</button>
        </div>
    </div>

    <div id="rank-trigger" onclick="toggleRank(true)">
        <i class="fa-solid fa-trophy"></i>
    </div>

    <div id="rank-panel">
        <div class="rank-header">
            <h2 style="margin:0">🏆 อันดับผู้กล้า</h2>
            <i class="fa-solid fa-circle-xmark" style="font-size:1.5rem; color:#475569" onclick="toggleRank(false)"></i>
        </div>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: -15px;">อัปเดตคนจริงทุก 1 นาที</p>
        <div id="rank-list">
            </div>
    </div>

    <div class="header">
        <div class="gold-display">🪙 <span id="gold-val">0</span></div>
        <div style="color:#64748b; font-size:0.9rem;">🌟 จุติ: <span id="rb-val">0</span> | เลเวล: <span id="lv-val">1</span></div>
    </div>

    <div class="boss-area">
        <div id="boss-img" class="boss-icon">👹</div>
        <div class="hp-box"><div id="hp-bar" class="hp-fill"></div></div>
        <div style="font-size:0.8rem; margin-top:8px;" id="hp-txt">100 / 100</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setTab(this, 'tab-atk')">⚔️ พลัง</button>
        <button class="tab-btn" onclick="setTab(this, 'tab-gold')">💰 เงิน</button>
        <button class="tab-btn" onclick="setTab(this, 'tab-rb')">🌀 จุติ</button>
    </div>

    <div class="content-area">
        <div id="tab-atk">
            <div class="card"><div><b>ดาบไม้</b><br><small>ดาเมจ +15</small></div><button class="buy-btn" onclick="buy('atk', 15, 50)">💰 50</button></div>
            <div class="card"><div><b>ดาบเหล็ก</b><br><small>ดาเมจ +100</small></div><button class="buy-btn" onclick="buy('atk', 100, 2000)">💰 2,000</button></div>
        </div>
        <div id="tab-gold" style="display:none">
            <div class="card"><div><b>กระเป๋าผ้า</b><br><small>เงิน x1.2</small></div><button class="buy-btn" onclick="buy('gold', 0.2, 100)">💰 100</button></div>
        </div>
        <div id="tab-rb" style="display:none">
            <div class="card" style="flex-direction:column; gap:10px;">
                <h3 style="margin:0">ระบบจุติใหม่</h3>
                <p id="rb-cost-txt">ต้องการ: 100,000</p>
                <button class="buy-btn" style="width:100%" onclick="rebirth()">จุติเพื่อรับพลัง x2</button>
            </div>
        </div>
    </div>

<script>
    let stats = { gold: 0, atk: 10, gMult: 1, lv: 1, rb: 0, hp: 100, mhp: 100, name: "" };
    let realPeople = [];

    // --- ระบบจัดลำดับ (จำลองคนจริง) ---
    function initRealPeople() {
        const names = ["สมชาย_Z", "Killer_TH", "น้องหมวย123", "BossHunted", "เทพซ่า007", "NinjaX", "Somsak_Pro", "DarkLord", "InwInw"];
        realPeople = names.map(n => ({ name: n, lv: Math.floor(Math.random() * 5) + 1 }));
    }

    function updateRanking() {
        // ทุก 1 นาที บอทคนจริงจะเลเวลอัพแบบสุ่มเพื่อให้ดูสมจริง
        realPeople.forEach(p => {
            if(Math.random() > 0.5) p.lv += 1;
        });
        renderRank();
        console.log("Ranking Updated!");
    }

    function renderRank() {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        
        let all = [...realPeople, { name: stats.name, lv: stats.lv, me: true }];
        all.sort((a,b) => b.lv - a.lv);

        all.forEach((p, i) => {
            const row = document.createElement('div');
            row.className = `rank-item ${p.me ? 'me' : ''}`;
            row.innerHTML = `<span>#${i+1}</span> <span>${p.name} ${p.me ? '(คุณ)' : ''}</span> <span>Lv.${p.lv}</span>`;
            list.appendChild(row);
        });
    }

    // --- ระบบเกมหลัก ---
    window.onload = () => {
        initRealPeople();
        setInterval(updateRanking, 60000); // อัปเดตทุก 1 นาที
        const saved = localStorage.getItem("CaptainEliteSave");
        if(saved) {
            stats = JSON.parse(saved);
            document.getElementById('start-screen').style.display = 'none';
            updateUI();
        }
    };

    function confirmName() {
        const input = document.getElementById('player-name-input').value;
        if(input.length < 2) return alert("ชื่อสั้นไปครับกัปตัน");
        stats.name = input;
        document.getElementById('start-screen').style.display = 'none';
        save();
        updateUI();
    }

    function toggleRank(show) {
        if(show) renderRank();
        document.getElementById('rank-panel').classList.toggle('active', show);
    }

    function attack(e) {
        if(e.target.closest('.content-area') || e.target.closest('.tabs') || e.target.closest('#rank-trigger')) return;
        
        const dmg = stats.atk * Math.pow(2, stats.rb);
        stats.hp -= dmg;

        // Damage Text
        const t = document.createElement('div');
        t.className = 'dmg-text';
        t.innerText = Math.floor(dmg);
        t.style.left = e.clientX + 'px'; t.style.top = e.clientY + 'px';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 600);

        // Animation
        const boss = document.getElementById('boss-img');
        boss.style.transform = "scale(0.8)";
        setTimeout(() => boss.style.transform = "scale(1)", 50);

        if(stats.hp <= 0) {
            stats.gold += stats.lv * 50 * stats.gMult * Math.pow(2, stats.rb);
            stats.lv++;
            stats.mhp = stats.lv * 150;
            stats.hp = stats.mhp;
            boss.innerText = ['👹','👽','👾','🐲','💀','🤖'][stats.lv % 6];
        }
        updateUI();
    }

    function buy(type, val, cost) {
        if(stats.gold >= cost) {
            stats.gold -= cost;
            if(type === 'atk') stats.atk += val;
            if(type === 'gold') stats.gMult += val;
            updateUI(); save();
        }
    }

    function rebirth() {
        if(stats.gold >= 100000) {
            stats.rb++; stats.gold = 0; stats.lv = 1; stats.atk = 10;
            stats.hp = 100; stats.mhp = 100;
            updateUI(); save();
            alert("✨ จุติสำเร็จ! พลังทวีคูณ");
        }
    }

    function setTab(btn, id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-atk').style.display = 'none';
        document.getElementById('tab-gold').style.display = 'none';
        document.getElementById('tab-rb').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(stats.gold).toLocaleString();
        document.getElementById('lv-val').innerText = stats.lv;
        document.getElementById('rb-val').innerText = stats.rb;
        document.getElementById('hp-bar').style.width = (stats.hp / stats.mhp * 100) + "%";
        document.getElementById('hp-txt').innerText = `${Math.floor(stats.hp).toLocaleString()} / ${stats.mhp.toLocaleString()}`;
        document.getElementById('rb-cost-txt').innerText = `ต้องการเงิน: ${(100000 - stats.gold > 0 ? (100000 - stats.gold).toLocaleString() : 'พร้อมแล้ว!')}`;
        
        document.querySelectorAll('.buy-btn').forEach(b => {
            const cost = parseInt(b.innerText.replace(/[^0-9]/g, ''));
            if(cost) b.disabled = stats.gold < cost;
        });
    }

    function save() {
        localStorage.setItem("CaptainEliteSave", JSON.stringify(stats));
    }
</script>
</body>
</html>
