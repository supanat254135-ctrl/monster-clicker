<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Clicker - Captain Right Top</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --bg: #020617;
            --card: #0f172a;
        }

        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Kanit', sans-serif; color: #fff; overflow: hidden; user-select: none; }

        /* --- ปุ่มอันดับอยู่ขวาบนสุดตามคำขอ --- */
        #rank-trigger { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            z-index: 2000; /* ให้อยู่บนสุดเสมอ */
            background: linear-gradient(135deg, #f59e0b, #fbbf24); 
            color: #000; 
            width: 50px; 
            height: 50px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.6rem; 
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            border: 2px solid #fff;
            cursor: pointer;
        }

        /* หน้าจอตั้งชื่อสวยๆ */
        #name-modal { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); z-index: 3000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .name-card { background: var(--card); padding: 30px; border-radius: 25px; border: 2px solid var(--primary); width: 85%; text-align: center; }
        .name-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 1.2rem; text-align: center; margin: 20px 0; }
        .confirm-btn { background: var(--accent); color: #000; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; }

        /* หน้าต่างจัดลำดับ Slide Up */
        #rank-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: var(--card); z-index: 2500; border-radius: 30px 30px 0 0; border-top: 4px solid var(--accent); transition: bottom 0.4s ease-out; padding: 20px; overflow-y: auto; }
        #rank-panel.show { bottom: 0; }
        .close-rank { text-align: center; margin-bottom: 10px; color: #64748b; font-size: 2rem; }

        .header { padding: 15px; padding-top: 20px; }
        .money-box { font-size: 2.2rem; color: var(--accent); font-weight: bold; }

        .boss-stage { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .boss-icon { font-size: 6rem; transition: transform 0.05s; filter: drop-shadow(0 0 15px #f43f5e); }
        .hp-outer { width: 80%; height: 14px; background: #1e293b; border-radius: 50px; margin-top: 20px; border: 1px solid #334155; overflow: hidden; }
        .hp-inner { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s; }

        .tabs { display: flex; background: #1e293b; margin: 10px; border-radius: 15px; padding: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; color: #94a3b8; border-radius: 10px; }
        .tab.active { background: var(--card); color: var(--primary); font-weight: bold; }

        .list-area { height: 45vh; overflow-y: auto; padding: 0 15px 100px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b; }
        .btn-buy { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        .rank-entry { display: flex; align-items: center; padding: 12px; background: #1e293b; margin-bottom: 6px; border-radius: 12px; }
        .rank-entry.me { border: 2px solid var(--primary); background: #172554; }
        .rank-v { margin-left: auto; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body onclick="doAttack(event)">

    <div id="name-modal" style="display: none;">
        <div class="name-card">
            <h2 style="color:var(--accent);">ตั้งชื่อกัปตัน</h2>
            <input type="text" id="p-name" class="name-input" placeholder="กรุณาใส่ชื่อของคุณ..." maxlength="10">
            <button class="confirm-btn" onclick="initPlayer()">ตกลง</button>
        </div>
    </div>

    <div id="rank-trigger" onclick="openRank()">
        <i class="fa-solid fa-trophy"></i>
    </div>

    <div id="rank-panel">
        <div class="close-rank" onclick="closeRank()"><i class="fa-solid fa-circle-chevron-down"></i></div>
        <h2 style="text-align:center; color:var(--accent);">🏆 อันดับผู้กล้า 1-99</h2>
        <div id="rank-content"></div>
    </div>

    <div class="header">
        <div class="money-box">🪙 <span id="m-val">0</span></div>
        <div style="color:#64748b;">🌟 จุติ: <span id="r-val">0</span> | เลเวล: <span id="l-val">1</span></div>
    </div>

    <div class="boss-stage">
        <div id="b-sprite" class="boss-icon">👺</div>
        <div class="hp-outer"><div id="hp-i" class="hp-inner"></div></div>
        <div id="hp-t" style="font-size:0.8rem; margin-top:5px;">HP: 100 / 100</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="setTab(this, 't1')">⚔️ พลัง</div>
        <div class="tab" onclick="setTab(this, 't2')">💰 เงิน</div>
        <div class="tab" onclick="setTab(this, 't3')">🌀 จุติ</div>
    </div>

    <div class="list-area">
        <div id="t1">
            <div class="item-card"><div><b>คมดาบ</b><br><small>ดาเมจ +20</small></div><button class="btn-buy" onclick="buy('atk', 20, 50)">💰 50</button></div>
            <div class="item-card"><div><b>ดาบยักษ์</b><br><small>ดาเมจ +200</small></div><button class="btn-buy" onclick="buy('atk', 200, 5000)">💰 5,000</button></div>
        </div>
        <div id="t2" style="display:none">
            <div class="item-card"><div><b>ถุงโชคดี</b><br><small>เงิน x1.5</small></div><button class="btn-buy" onclick="buy('gold', 0.5, 200)">💰 200</button></div>
        </div>
        <div id="t3" style="display:none">
            <div style="text-align:center; padding:20px;">
                <h3 id="rb-status">จุติใหม่เพื่อพลัง 2 เท่า</h3>
                <button class="btn-buy" style="width:100%; height:50px;" onclick="rebirth()">จุติเลย (100,000)</button>
            </div>
        </div>
    </div>

<script>
    let d = { m:0, a:10, g:1, l:1, r:0, name:"", hp:100, mhp:100, start:Date.now() };
    let bots = [];

    window.onload = () => {
        const s = localStorage.getItem("CapSaveV2");
        if(s) { d = JSON.parse(s); update(); } 
        else { document.getElementById('name-modal').style.display = 'flex'; }
        for(let i=1; i<99; i++) bots.push({ n:"Player_"+i, b: Math.floor(Math.random()*10)+1 });
    };

    function initPlayer() {
        const n = document.getElementById('p-name').value;
        if(n.length < 2) return;
        d.name = n; d.start = Date.now();
        document.getElementById('name-modal').style.display = 'none';
        save(); update();
    }

    function openRank() {
        const list = document.getElementById('rank-content');
        list.innerHTML = "";
        let days = Math.floor((Date.now() - d.start)/(1000*60*60*24));
        let all = bots.map(b => ({ n:b.n, v:b.b + (days*7), me:false }));
        all.push({ n:d.name, v:d.l, me:true });
        all.sort((x,y) => y.v - x.v);
        
        all.slice(0,99).forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `rank-entry ${p.me?'me':''}`;
            div.innerHTML = `<span>#${i+1} ${p.n}</span><span class="rank-v">Lv.${p.v}</span>`;
            list.appendChild(div);
        });
        document.getElementById('rank-panel').classList.add('show');
    }

    function closeRank() { document.getElementById('rank-panel').classList.remove('show'); }

    function doAttack(e) {
        if(e.target.closest('.list-area') || e.target.closest('.tabs') || e.target.closest('#rank-trigger')) return;
        let dmg = d.a * Math.pow(2, d.r);
        d.hp -= dmg;
        if(d.hp <= 0) {
            d.m += d.l * 50 * d.g * Math.pow(2, d.r);
            d.l++; d.mhp = d.l * 150; d.hp = d.mhp;
        }
        update();
    }

    function buy(t, v, c) {
        if(d.m >= c) { d.m -= c; if(t==='atk') d.a+=v; else d.g+=v; update(); save(); }
    }

    function rebirth() {
        if(d.m >= 100000) { d.r++; d.m=0; d.l=1; d.a=10; d.hp=100; d.mhp=100; update(); save(); }
    }

    function setTab(btn, id) {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById('t1').style.display='none';
        document.getElementById('t2').style.display='none';
        document.getElementById('t3').style.display='none';
        btn.classList.add('active');
        document.getElementById(id).style.display='block';
    }

    function update() {
        document.getElementById('m-val').innerText = Math.floor(d.m).toLocaleString();
        document.getElementById('l-val').innerText = d.l;
        document.getElementById('r-val').innerText = d.r;
        document.getElementById('hp-i').style.width = (d.hp/d.mhp*100) + "%";
        document.getElementById('hp-t').innerText = `HP: ${Math.floor(d.hp)} / ${d.mhp}`;
    }

    function save() { localStorage.setItem("CapSaveV2", JSON.stringify(d)); }
</script>
</body>
</html>
